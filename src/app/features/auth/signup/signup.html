<section class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">
      Start turning documents into intelligence
    </p>
    <form (ngSubmit)="signup()" autocomplete="off">
      <div class="field">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="signup-email"
          autocomplete="username"
          required
          placeholder="you@example.com"
        />
      </div>

      <div class="field">
        <label>Company</label>
        <input
          type="text"
          [(ngModel)]="company"
          name="company"
          required
          placeholder="Company name"
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="new-password"
          autocomplete="new-password"
          required
          placeholder="••••••••"
        />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirm-new-password"
          autocomplete="new-password"
          required
          placeholder="••••••••"
        />
      </div>
      <button class="auth-btn" type="submit">
        Sign Up
      </button>
    </form>
    <p class="switch">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </div>
</section>
